<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; width: 340px; margin: 0; padding: 12px; }
    h2 { font-size: 15px; margin: 0 0 8px; }
    .score { font-size: 32px; font-weight: 700; }
    .low { color: #188038; } .medium { color: #f9ab00; } .high { color: #d93025; }
    section { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    .row { display: flex; justify-content: space-between; font-size: 13px; margin: 2px 0; }
    .tag { font-size: 11px; padding: 1px 6px; border-radius: 3px; background: #eee; }
    button { width: 100%; padding: 6px; margin-top: 6px; cursor: pointer; }
    ul { margin: 4px 0; padding-left: 18px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>SiteGuard</h2>
  <div id="report">Loading…</div>
  <button id="rescan">Re-scan this page</button>
  <script src="popup.js"></script>
</body>
</html>
